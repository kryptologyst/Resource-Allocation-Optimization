# High resource availability scenario
solver_type: "scipy"
random_seed: 42

data_generation:
  n_projects: 8
  n_resources: 6
  project_types: ["Development", "Marketing", "Operations", "Research", "Support", "Sales", "HR", "Finance"]
  resource_types: ["Labor", "Budget", "Equipment", "Time", "Space", "Technology"]

# Increase resource availability multipliers
resource_multipliers:
  Labor: 1.5
  Budget: 2.0
  Equipment: 1.3
  Time: 1.2
  Space: 1.0
  Technology: 1.4

optimization:
  objective_type: "maximize_profit"
  max_iterations: 2000
  tolerance: 1e-8

evaluation:
  include_shadow_prices: true
  calculate_sensitivity: true
  generate_reports: true

visualization:
  style: "seaborn-v0_8"
  save_plots: true
  plot_format: "html"
  figure_size: [14, 10]

output:
  save_results: true
  results_dir: "assets/results/high_availability"
  plots_dir: "assets/plots/high_availability"
  reports_dir: "assets/reports/high_availability"
